name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: icon-tracer
  TAP_REPOSITORY: xzhih/homebrew-tap
  FORMULA_PATH: Formula/icon-tracer.rb

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Governance
        run: scripts/check-governance.py

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test

      - name: Release build
        run: cargo build --release

      - name: Whitespace
        run: git diff --check

  build-macos:
    name: Build macOS universal
    runs-on: macos-15
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Build macOS targets
        shell: bash
        run: |
          set -euo pipefail
          cargo build --release --target aarch64-apple-darwin
          cargo build --release --target x86_64-apple-darwin

      - name: Package universal binary
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          name="${BIN_NAME}-${tag}-apple-darwin-universal"
          mkdir -p "dist/${name}"
          lipo -create \
            "target/aarch64-apple-darwin/release/${BIN_NAME}" \
            "target/x86_64-apple-darwin/release/${BIN_NAME}" \
            -output "dist/${name}/${BIN_NAME}"
          chmod +x "dist/${name}/${BIN_NAME}"
          tar -C dist -czf "dist/${name}.tar.gz" "${name}"
          shasum -a 256 "dist/${name}.tar.gz" > "dist/${name}.tar.gz.sha256"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-apple-darwin-universal
          path: |
            dist/*.tar.gz
            dist/*.sha256
          if-no-files-found: error

  build-linux:
    name: Build Linux ${{ matrix.label }}
    runs-on: ubuntu-latest
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: x86_64
            target: x86_64-unknown-linux-gnu
            linker: ""
          - label: ARM64
            target: aarch64-unknown-linux-gnu
            linker: aarch64-linux-gnu-gcc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux ARM linker
        if: matrix.linker != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build Linux target
        env:
          TARGET: ${{ matrix.target }}
          LINKER: ${{ matrix.linker }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${LINKER}" ]; then
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER="${LINKER}"
          fi
          cargo build --release --target "${TARGET}"

      - name: Package Linux binary
        env:
          TARGET: ${{ matrix.target }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          name="${BIN_NAME}-${tag}-${TARGET}"
          mkdir -p "dist/${name}"
          cp "target/${TARGET}/release/${BIN_NAME}" "dist/${name}/${BIN_NAME}"
          chmod +x "dist/${name}/${BIN_NAME}"
          tar -C dist -czf "dist/${name}.tar.gz" "${name}"
          sha256sum "dist/${name}.tar.gz" > "dist/${name}.tar.gz.sha256"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.sha256
          if-no-files-found: error

  build-windows:
    name: Build Windows x86_64
    runs-on: windows-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          key: windows-x86_64

      - name: Build Windows target
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Package Windows binary
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $tag = $env:GITHUB_REF_NAME
          $binName = $env:BIN_NAME
          $target = "x86_64-pc-windows-msvc"
          $name = "$binName-$tag-$target"
          New-Item -ItemType Directory -Force -Path "dist/$name" | Out-Null
          Copy-Item "target/$target/release/$binName.exe" "dist/$name/$binName.exe"
          Compress-Archive -Path "dist/$name" -DestinationPath "dist/$name.zip" -Force
          $hash = (Get-FileHash "dist/$name.zip" -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $name.zip" | Set-Content -Path "dist/$name.zip.sha256" -Encoding ascii -NoNewline

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-x86_64-pc-windows-msvc
          path: |
            dist/*.zip
            dist/*.sha256
          if-no-files-found: error

  publish-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - build-macos
      - build-linux
      - build-windows

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-assets-*
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist/* \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber
          else
            gh release create "${GITHUB_REF_NAME}" dist/* \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes
          fi

  update-homebrew-tap:
    name: Update Homebrew tap
    runs-on: ubuntu-latest
    needs: publish-release

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-assets-*
          path: dist
          merge-multiple: true

      - name: Checkout tap
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TAP_REPOSITORY }}
          path: tap
          ssh-key: ${{ secrets.TAP_DEPLOY_KEY }}

      - name: Update formula
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          mac_asset="${BIN_NAME}-${tag}-apple-darwin-universal.tar.gz"
          linux_x86_asset="${BIN_NAME}-${tag}-x86_64-unknown-linux-gnu.tar.gz"
          linux_arm_asset="${BIN_NAME}-${tag}-aarch64-unknown-linux-gnu.tar.gz"
          mac_sha="$(cut -d ' ' -f 1 "dist/${mac_asset}.sha256")"
          linux_x86_sha="$(cut -d ' ' -f 1 "dist/${linux_x86_asset}.sha256")"
          linux_arm_sha="$(cut -d ' ' -f 1 "dist/${linux_arm_asset}.sha256")"
          mac_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${tag}/${mac_asset}"
          linux_x86_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${tag}/${linux_x86_asset}"
          linux_arm_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${tag}/${linux_arm_asset}"

          mkdir -p "tap/$(dirname "${FORMULA_PATH}")"
          cat > "tap/${FORMULA_PATH}" <<EOF
          class IconTracer < Formula
            desc "Small Rust icon-oriented bitmap-to-SVG tracer"
            homepage "https://github.com/${GITHUB_REPOSITORY}"
            license "MIT"
            version "${version}"

            on_macos do
              url "${mac_url}"
              sha256 "${mac_sha}"
            end

            on_linux do
              on_intel do
                url "${linux_x86_url}"
                sha256 "${linux_x86_sha}"
              end

              on_arm do
                url "${linux_arm_url}"
                sha256 "${linux_arm_sha}"
              end
            end

            def install
              bin.install "icon-tracer"
            end

            test do
              (testpath/"input.pbm").write "P1\n1 1\n1\n"
              system "#{bin}/icon-tracer", "--preset", "default", testpath/"input.pbm", testpath/"output.svg"
              assert_path_exists testpath/"output.svg"
            end
          end
          EOF

      - name: Commit and push formula
        shell: bash
        run: |
          set -euo pipefail
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${FORMULA_PATH}"
          if git diff --cached --quiet; then
            echo "Formula is already up to date."
            exit 0
          fi
          git commit -m "Update icon-tracer ${GITHUB_REF_NAME}"
          git push
